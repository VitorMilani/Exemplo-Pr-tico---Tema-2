<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Calculadora de Desconto</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2>Calculadora de Desconto</h2>
    <input type="number" id="valor" placeholder="Valor do produto (R$)" />
    <input type="number" id="percentual" placeholder="Desconto percentual (%)" />
    <input type="number" id="fixo" placeholder="Desconto fixo (R$)" />
    <button onclick="calcular()">Calcular</button>
    <div id="resultado"></div>
  </div>
  <script src="script.js"></script>
</body>
</html>
