<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Calculadora de Desconto</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container" role="main">
    <h2>Calculadora de Desconto</h2>
    
    <label for="valor" hidden>Valor do produto</label>
    <input type="number" id="valor" placeholder="Valor do produto (R$)" aria-label="Valor do produto (R$)" />

    <label for="percentual" hidden>Desconto percentual</label>
    <input type="number" id="percentual" placeholder="Desconto percentual (%)" aria-label="Desconto percentual (%)" />

    <label for="fixo" hidden>Desconto fixo</label>
    <input type="number" id="fixo" placeholder="Desconto fixo (R$)" aria-label="Desconto fixo (R$)" />

    <button type="button" onclick="calcular()">Calcular</button>

    <div id="resultado" aria-live="polite"></div>
  </main>

  <script src="script.js"></script>
</body>
</html>
